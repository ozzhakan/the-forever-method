    <!-- Open Graph — controls Facebook / LinkedIn / WhatsApp link previews. -->
    <!-- Canonical URL — tells crawlers + social platforms which URL is the real one,
         so theunhookedmethod.com is the single source of truth even if the site
         is also reachable via a *.vercel.app preview URL. -->
    <link rel="canonical" href="https://theunhookedmethod.com" />

    <!-- Hard-redirect any visitor reaching a Vercel preview URL to the real
         production domain. Keeps localhost dev untouched. Runs in <head>
         before React mounts so attribution + analytics stay on one domain. -->
    <script>
      (function () {
        try {
          var h = window.location.hostname;
          if (h.endsWith('.vercel.app')) {
            window.location.replace(
              'https://theunhookedmethod.com'
              + window.location.pathname
              + window.location.search
              + window.location.hash
            );
          }
        } catch (e) { /* no-op */ }
      })();
    </script>

    <!-- Trackers (Meta Pixel + Microsoft Clarity + Google Ads gtag) are
         stub-initialised synchronously so any early fbq()/clarity()/gtag()
         calls queue safely, but the heavy loader scripts are deferred
         until after `load` (or first user interaction) to keep them off
         the critical path. Pingdom showed 588ms of blocking wait on
         Facebook signals/config — deferral removes that. -->
    <script>
      (function () {
        var f = window, b = document;

        // ── Meta Pixel stub (Pixel ID: 828094209949462) ──
        f.fbq = f.fbq || function () {
          (f.fbq.callMethod ? f.fbq.callMethod.apply(f.fbq, arguments) : f.fbq.queue.push(arguments));
        };
        if (!f._fbq) f._fbq = f.fbq;
        f.fbq.push = f.fbq; f.fbq.loaded = true; f.fbq.version = '2.0'; f.fbq.queue = [];
        f.fbq('init', '828094209949462');
        f.fbq('track', 'PageView');

        // ── Microsoft Clarity stub (Project ID: wsfm0n6r6e) ──
        f.clarity = f.clarity || function () { (f.clarity.q = f.clarity.q || []).push(arguments); };

        // ── Google Ads gtag stub (Tag ID: AW-18180111003) ──
        // dataLayer + gtag() exist immediately, so config + any later
        // conversion events queue and replay once gtag.js loads.
        f.dataLayer = f.dataLayer || [];
        f.gtag = f.gtag || function () { f.dataLayer.push(arguments); };
        f.gtag('js', new Date());
        f.gtag('config', 'AW-18180111003');

        var loaded = false;
        function loadTrackers() {
          if (loaded) return; loaded = true;
          var first = b.getElementsByTagName('script')[0];
          // Meta Pixel
          var s = b.createElement('script'); s.async = true;
          s.src = 'https://connect.facebook.net/en_US/fbevents.js';
          first.parentNode.insertBefore(s, first);
          // Microsoft Clarity
          var c = b.createElement('script'); c.async = true;
          c.src = 'https://www.clarity.ms/tag/wsfm0n6r6e';
          first.parentNode.insertBefore(c, first);
          // Google Ads gtag
          var g = b.createElement('script'); g.async = true;
          g.src = 'https://www.googletagmanager.com/gtag/js?id=AW-18180111003';
          first.parentNode.insertBefore(g, first);
        }

        // Fire whichever comes first: window load, 2s safety timeout, or
        // first user interaction. Captures bounced sessions reliably
        // without burning critical-path budget.
        if (b.readyState === 'complete') {
          setTimeout(loadTrackers, 0);
        } else {
          window.addEventListener('load', function () { setTimeout(loadTrackers, 0); }, { once: true });
        }
        setTimeout(loadTrackers, 2000);
        ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(function (evt) {
          window.addEventListener(evt, loadTrackers, { once: true, passive: true });
        });
      })();
    </script>
